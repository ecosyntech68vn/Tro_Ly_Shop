{% extends "dashboard/layout.html" %}
{% block content %}
<div class="header"><h1>💬 Hội thoại</h1></div>

{% if chats %}
<table><tr><th>Khách</th><th>Vai trò</th><th>Nội dung</th><th>Lúc</th></tr>
{% for c in chats %}
<tr>
  <td><code>{{ c.customer }}</code></td>
  <td><span class="badge {% if c.role == 'user' %}badge-green{% else %}badge-yellow{% endif %}">{{ c.role }}</span></td>
  <td class="msg">{{ c.msg }}</td>
  <td style="white-space:nowrap">{{ c.ts }}</td>
</tr>
{% endfor %}
</table>
{% else %}
<div class="empty">Chưa có hội thoại nào</div>
{% endif %}
{% endblock %}
